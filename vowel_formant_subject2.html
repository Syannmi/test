
<div style="padding: 1rem 0;">
  <div style="position: relative; width: 100%; height: 480px;">
    <canvas id="vowelChart2" role="img" aria-label="英語母音共振峰散佈圖，比較參考值與受試者二的 F1/F2 數值">Mother vowel formant scatter plot comparing reference and subject 2.</canvas>
  </div>
  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; font-size: 13px; color: var(--color-text-secondary); justify-content: center;">
    <span style="display: flex; align-items: center; gap: 6px;">
      <span style="width: 12px; height: 12px; border-radius: 50%; background: #185FA5; display:inline-block;"></span> 參考值 (Reference)
    </span>
    <span style="display: flex; align-items: center; gap: 6px;">
      <span style="width: 12px; height: 12px; border-radius: 50%; background: #3B6D11; display:inline-block;"></span> 受試者二 (Subject 2)
    </span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
Chart.register(ChartDataLabels);

const vowels = ['/i/', '/ɪ/', '/e/', '/æ/', '/ə/', '/ʌ/', '/u/', '/ʊ/', '/ɔ/', '/ɑ/'];

const ref = [
  {x: 2290, y: 270},
  {x: 1990, y: 390},
  {x: 1840, y: 530},
  {x: 1720, y: 660},
  {x: 1500, y: 500},
  {x: 1190, y: 640},
  {x: 870,  y: 300},
  {x: 1170, y: 440},
  {x: 840,  y: 570},
  {x: 1090, y: 730},
];

const subj = [
  {x: 1855, y: 376},
  {x: 1801, y: 414},
  {x: 1710, y: 735},
  {x: 1800, y: 700},
  {x: 1280, y: 527},
  {x: 1247, y: 770},
  {x: 880,  y: 362},
  {x: 1097, y: 390},
  {x: 1181, y: 642},
  {x: 1317, y: 739},
];

new Chart(document.getElementById('vowelChart2'), {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: '參考值',
        data: ref,
        backgroundColor: 'rgba(24, 95, 165, 0.85)',
        borderColor: '#185FA5',
        pointRadius: 8,
        pointHoverRadius: 10,
        datalabels: {
          color: '#0C447C',
          font: { size: 13, weight: '500' },
          formatter: (val, ctx) => vowels[ctx.dataIndex],
          align: 'top',
          offset: 6,
        }
      },
      {
        label: '受試者二',
        data: subj,
        backgroundColor: 'rgba(59, 109, 17, 0.85)',
        borderColor: '#3B6D11',
        pointRadius: 8,
        pointHoverRadius: 10,
        pointStyle: 'triangle',
        datalabels: {
          color: '#27500A',
          font: { size: 13, weight: '500' },
          formatter: (val, ctx) => vowels[ctx.dataIndex],
          align: 'bottom',
          offset: 6,
        }
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => {
            const v = vowels[ctx.dataIndex];
            return `${v}  F2: ${ctx.parsed.x} Hz, F1: ${ctx.parsed.y} Hz`;
          }
        }
      }
    },
    scales: {
      x: {
        title: {
          display: true,
          text: 'F2 (Hz)',
          font: { size: 13 },
          color: '#888780'
        },
        min: 700,
        max: 2600,
        reverse: true,
        ticks: { stepSize: 200, color: '#888780', font: { size: 12 } },
        grid: { color: 'rgba(136,135,128,0.15)' }
      },
      y: {
        title: {
          display: true,
          text: 'F1 (Hz)',
          font: { size: 13 },
          color: '#888780'
        },
        min: 200,
        max: 1000,
        reverse: true,
        ticks: { stepSize: 100, color: '#888780', font: { size: 12 } },
        grid: { color: 'rgba(136,135,128,0.15)' }
      }
    }
  }
});
</script>
